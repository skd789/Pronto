<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Ticket</title>

<link rel="stylesheet" href="../style.css">

<style>

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.ticket-card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.ticket-card h2{
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:20px;
}

.col{
    flex:1;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover{
    background:#1d4ed8;
}

</style>

</head>
<body>

<nav class="navbar">

    <div class="logo">
        pronto
    </div>

    <div class="nav-menu">

        <a href="../index.html" class="nav-item">
            📊 Dashboard
        </a>

        <div class="nav-dropdown">
            <button class="nav-item">
                🎫 Tickets
            </button>

            <div class="dropdown-content">
                <a href="create-ticket.html">Create Ticket</a>
                <a href="edit-ticket.html">View / Edit Ticket</a>
                <a href="closed-ticket.html">Closed Tickets</a>
            </div>
        </div>

    </div>

</nav>

<div class="container">

<div class="ticket-card">

<h2>Create New Ticket</h2>

<form>

    <div class="row">

        <div class="col">
            <div class="form-group">
                <label>Intimate Date from PL</label>
                <input type="date">
            </div>
        </div>

        <div class="col">
            <div class="form-group">
                <label>Country</label>
                <select>
                    <option>Select Country</option>
                    <option>India</option>
                    <option>Germany</option>
                    <option>USA</option>
                    <option>France</option>
                    <option>Japan</option>
                </select>
            </div>
        </div>

    </div>

    <div class="form-group">
        <label>Pronto Number</label>
        <input type="text" placeholder="Enter Pronto Number">
    </div>

    <div class="row">

        <div class="col">
            <div class="form-group">
                <label>Unit Part Code</label>

                <select id="partCode">
                    <option value="">Select Part Code</option>
                    <option value="PC1001">PC1001</option>
                    <option value="PC1002">PC1002</option>
                    <option value="PC1003">PC1003</option>
                </select>
            </div>
        </div>

        <div class="col">
            <div class="form-group">
                <label>Unit Name</label>
                <input type="text" id="unitName" readonly>
            </div>
        </div>

    </div>

    <div class="row">

        <div class="col">
            <div class="form-group">
                <label>Part Group</label>
                <input type="text" id="partGroup" readonly>
            </div>
        </div>

        <div class="col">
            <div class="form-group">
                <label>Part Family</label>
                <input type="text" id="partFamily" readonly>
            </div>
        </div>

    </div>

    <div class="row">

        <div class="col">
            <div class="form-group">
                <label>Unit Version</label>
                <input type="text" placeholder="Enter Unit Version">
            </div>
        </div>

        <div class="col">
            <div class="form-group">
                <label>Unit Serial Number</label>
                <input type="text" placeholder="Enter Serial Number">
            </div>
        </div>

    </div>

    <div class="form-group">
        <label>Field Fault Description</label>
        <textarea rows="5"></textarea>
    </div>

    <div class="row">

        <div class="col">
            <div class="form-group">
                <label>Owner Type</label>

                <select>
                    <option>Select Owner Type</option>
                    <option>RC Owner</option>
                    <option>R&D Owner</option>
                </select>
            </div>
        </div>

        <div class="col">
            <div class="form-group">
                <label>Owner Name</label>
                <input type="text">
            </div>
        </div>

    </div>

    <button type="submit" class="btn">
        Create Ticket
    </button>

</form>

</div>

</div>

<script src="../ticket.js"></script>

</body>
</html>
